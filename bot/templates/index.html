<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Trading Bot - Web UI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e17;
            color: #e0e0e0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: linear-gradient(135deg, #1a1f36, #0d1117);
            padding: 20px 30px;
            border-radius: 12px;
            border: 1px solid #30363d;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 28px;
            background: linear-gradient(90deg, #f7931a, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .status {
            font-size: 14px;
            color: #8b949e;
        }
        .header .status .online {
            color: #3fb950;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
        }
        .card h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #f0f6fc;
        }
        .card h2 .icon {
            margin-right: 8px;
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #8b949e;
            margin-bottom: 4px;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 14px;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #f7931a;
        }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(90deg, #f7931a, #ff6b35);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(247, 147, 26, 0.3);
        }
        .btn-success {
            background: #238636;
            color: white;
        }
        .btn-success:hover {
            background: #2ea043;
        }
        .btn-danger {
            background: #da3633;
            color: white;
        }
        .btn-danger:hover {
            background: #f85149;
        }
        .btn-secondary {
            background: #30363d;
            color: #e0e0e0;
        }
        .btn-secondary:hover {
            background: #40464d;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .result-box {
            margin-top: 15px;
            padding: 15px;
            background: #0d1117;
            border-radius: 6px;
            border-left: 4px solid #f7931a;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        .result-box.success {
            border-left-color: #3fb950;
        }
        .result-box.error {
            border-left-color: #f85149;
        }
        .price-display {
            text-align: center;
            padding: 20px;
            background: #0d1117;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .price-display .price {
            font-size: 36px;
            font-weight: bold;
            color: #3fb950;
        }
        .price-display .label {
            font-size: 14px;
            color: #8b949e;
        }
        .price-display .change {
            font-size: 16px;
            margin-top: 5px;
        }
        .price-display .change.positive { color: #3fb950; }
        .price-display .change.negative { color: #f85149; }
        .order-type-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        .order-type-tabs button {
            padding: 8px 16px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #8b949e;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .order-type-tabs button.active {
            background: #f7931a;
            color: white;
            border-color: #f7931a;
        }
        .order-type-tabs button:hover {
            border-color: #f7931a;
        }
        .hidden { display: none; }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-badge.success { background: #238636; color: white; }
        .status-badge.error { background: #da3633; color: white; }
        .status-badge.pending { background: #d29922; color: white; }
        
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; text-align: center; gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🚀 Trading Bot</h1>
            <div class="status">
                <span class="online">●</span> Online
                <span style="margin-left: 15px;">⚡ Binance Futures Testnet</span>
                <span style="margin-left: 15px;" id="time-display"></span>
            </div>
        </div>

        <!-- Price Display -->
        <div class="card" style="margin-bottom: 20px;">
            <div class="price-display">
                <div class="label" id="price-label">BTCUSDT Price</div>
                <div class="price" id="price-display">$0.00</div>
                <div class="change" id="price-change">Loading...</div>
            </div>
        </div>

        <!-- Main Grid -->
        <div class="grid">
            <!-- Order Form -->
            <div class="card">
                <h2><span class="icon">📊</span> Place Order</h2>
                
                <div class="order-type-tabs">
                    <button class="active" data-type="MARKET">MARKET</button>
                    <button data-type="LIMIT">LIMIT</button>
                    <button data-type="STOP_LIMIT">STOP_LIMIT</button>
                </div>

                <form id="order-form">
                    <div class="form-group">
                        <label>Symbol</label>
                        <input type="text" id="symbol" value="BTCUSDT" placeholder="e.g., BTCUSDT">
                    </div>
                    <div class="form-group">
                        <label>Side</label>
                        <select id="side">
                            <option value="BUY">BUY</option>
                            <option value="SELL">SELL</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="number" id="quantity" value="0.001" step="0.001" min="0.001">
                    </div>
                    <div class="form-group" id="price-group">
                        <label>Price</label>
                        <input type="number" id="price" placeholder="Enter limit price (e.g., 65000)">
                    </div>
                    <div class="form-group hidden" id="stop-price-group">
                        <label>Stop Price</label>
                        <input type="number" id="stop_price" placeholder="Enter stop price (e.g., 66000)">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Place Order</button>
                </form>

                <div id="order-result" class="result-box hidden"></div>
            </div>

            <!-- Account & Auto-Trading -->
            <div class="card">
                <h2><span class="icon">💼</span> Account</h2>
                <div id="account-info">
                    <p style="color: #8b949e;">Loading account info...</p>
                </div>
                <hr style="border-color: #30363d; margin: 15px 0;">
                
                <h2><span class="icon">🤖</span> Auto-Trading</h2>
                <div class="form-group">
                    <label>Strategy</label>
                    <select id="auto-strategy">
                        <option value="drop">Price Drop</option>
                        <option value="sma">SMA Crossover</option>
                        <option value="rsi">RSI Strategy</option>
                        <option value="macd">MACD Strategy</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Interval (seconds)</label>
                    <input type="number" id="auto-interval" value="60">
                </div>
                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" id="auto-amount" value="0.001" step="0.001">
                </div>
                <button id="start-auto-btn" class="btn btn-success" style="width: 100%;">▶ Start Auto-Trading</button>
                <div id="auto-status" style="margin-top: 10px; font-size: 13px; color: #8b949e;"></div>
            </div>
        </div>
    </div>

    <script>
        // Order type tabs
        const tabs = document.querySelectorAll('.order-type-tabs button');
        let currentOrderType = 'MARKET';

        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                tabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentOrderType = this.dataset.type;
                
                // Show/hide price fields
                document.getElementById('price-group').classList.toggle('hidden', currentOrderType === 'MARKET');
                document.getElementById('stop-price-group').classList.toggle('hidden', currentOrderType !== 'STOP_LIMIT');
            });
        });

        // Update time
        function updateTime() {
            document.getElementById('time-display').textContent = new Date().toLocaleTimeString();
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Update price
        function updatePrice() {
            const symbol = document.getElementById('symbol').value || 'BTCUSDT';
            fetch(`/api/price/${symbol}`)
                .then(response => response.json())
                .then(data => {
                    if (data.price) {
                        const price = parseFloat(data.price);
                        document.getElementById('price-display').textContent = `$${price.toFixed(2)}`;
                        document.getElementById('price-label').textContent = `${symbol} Price`;
                        document.getElementById('price-change').textContent = 'Live';
                        document.getElementById('price-change').className = 'change positive';
                    }
                })
                .catch(() => {
                    document.getElementById('price-display').textContent = 'Error loading price';
                });
        }
        setInterval(updatePrice, 5000);
        updatePrice();

        // Load account info
        function loadAccount() {
            fetch('/api/account')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('account-info').innerHTML = `
                            <p>💰 Balance: $${parseFloat(data.totalWalletBalance || 0).toFixed(2)}</p>
                            <p>📈 P&L: $${parseFloat(data.totalUnrealizedProfit || 0).toFixed(2)}</p>
                            <p>📊 Status: ${data.canTrade ? '✅ Trading Enabled' : '❌ Trading Disabled'}</p>
                        `;
                    }
                })
                .catch(() => {
                    document.getElementById('account-info').innerHTML = '<p style="color: #8b949e;">Account info unavailable</p>';
                });
        }
        loadAccount();

        // Place order
        document.getElementById('order-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const resultDiv = document.getElementById('order-result');
            resultDiv.className = 'result-box';
            resultDiv.textContent = '⏳ Placing order...';
            resultDiv.classList.remove('hidden');

            const data = {
                symbol: document.getElementById('symbol').value,
                side: document.getElementById('side').value,
                order_type: currentOrderType,
                quantity: document.getElementById('quantity').value,
                price: document.getElementById('price').value,
                stop_price: document.getElementById('stop_price').value
            };

            fetch('/api/place_order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    resultDiv.className = 'result-box success';
                    resultDiv.textContent = data.summary || '✅ Order placed successfully!';
                } else {
                    resultDiv.className = 'result-box error';
                    resultDiv.textContent = `❌ Error: ${data.error || 'Order failed'}`;
                }
            })
            .catch(error => {
                resultDiv.className = 'result-box error';
                resultDiv.textContent = `❌ Error: ${error.message}`;
            });
        });

        // Start auto-trading
        document.getElementById('start-auto-btn').addEventListener('click', function() {
            const btn = this;
            const statusDiv = document.getElementById('auto-status');
            
            const data = {
                symbol: document.getElementById('symbol').value,
                strategy: document.getElementById('auto-strategy').value,
                interval: parseInt(document.getElementById('auto-interval').value),
                amount: parseFloat(document.getElementById('auto-amount').value)
            };

            btn.disabled = true;
            btn.textContent = '⏳ Starting...';
            statusDiv.textContent = 'Starting auto-trading...';

            fetch('/api/start_auto', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    statusDiv.innerHTML = `
                        ✅ Auto-trading started!<br>
                        📊 Strategy: ${data.strategy}<br>
                        ⏱️ Interval: ${data.interval}s<br>
                        💰 Amount: ${data.amount}<br>
                        <span style="color: #d29922;">⚠️ Check terminal for output</span>
                    `;
                    btn.textContent = '▶ Running...';
                } else {
                    statusDiv.textContent = `❌ Error: ${data.error}`;
                    btn.disabled = false;
                    btn.textContent = '▶ Start Auto-Trading';
                }
            })
            .catch(error => {
                statusDiv.textContent = `❌ Error: ${error.message}`;
                btn.disabled = false;
                btn.textContent = '▶ Start Auto-Trading';
            });
        });
    </script>
</body>
</html>
